<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaQuant QFII - 智能研报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Noto Sans SC"', '"Roboto"', 'sans-serif'],
            },
            colors: {
              primary: '#1a73e8',
              secondary: '#5f6368',
              surface: '#ffffff',
              background: '#f8f9fa',
              success: '#1e8e3e',
              warning: '#f9ab00',
              error: '#d93025',
              'qfii-blue': '#003366',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Noto Sans SC', sans-serif;
        background-color: #f8f9fa;
      }
      /* Custom scrollbar for material feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
      }
      .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #003366; }
      .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1a73e8; border-bottom: 2px solid #e8eaed; padding-bottom: 4px; }
      .markdown-body h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #202124; }
      .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; font-size: 12px; }
      .markdown-body ul, .markdown-body ol { margin-bottom: 0.75rem; padding-left: 1.5rem; font-size: 12px; }
      .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 12px; }
      .markdown-body th, .markdown-body td { border: 1px solid #dadce0; padding: 8px; text-align: left; }
      .markdown-body th { background-color: #f1f3f4; font-weight: 600; }
      .markdown-body strong { color: #d93025; font-weight: 700; } /* Highlighting important text */
      .markdown-body blockquote { border-left: 4px solid #1a73e8; padding-left: 1rem; color: #5f6368; margin-left: 0; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
